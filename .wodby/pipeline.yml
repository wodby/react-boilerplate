version: 0.1

workflows:
  main:
    jobs:
      - build

jobs:
  build:
    steps:
      - clone

      - cache_restore:
          path: ~/.npm
          key: 'npm-{{ hash "package-lock.json" }}-v1'

      - run: wget -qO- https://api.wodby.com/v1/get/cli | sh
      - run: wodby ci init $WODBY_BUILD_ID

      - run: wodby ci run -v $HOME/.npm:/home/node/.npm -i wodby/node -- npm ci
      - run: wodby ci run -v $HOME/.npm:/home/node/.npm -i wodby/node -- npm run build
      - cache_save:
          key: 'npm-{{ hash "package-lock.json" }}-v1'
          path: ~/.npm

      - run: wodby ci build --from dist
      - run: wodby ci release
      - run: wodby ci deploy
